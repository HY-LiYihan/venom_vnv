bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link_fake
    odom_topic: /odometry/global
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_wait_cancel_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: progress_checker
    goal_checker_plugins:
      - general_goal_checker
    controller_plugins:
      - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28
    FollowPath:
      plugin: teb_local_planner::TebLocalPlannerROS
      odom_topic: /odometry/global
      teb_autosize: true
      dt_ref: 0.3
      dt_hysteresis: 0.1
      max_samples: 500
      global_plan_overwrite_orientation: false
      allow_init_with_backwards_motion: true
      max_global_plan_lookahead_dist: 3.0
      global_plan_viapoint_sep: -1.0
      global_plan_prune_distance: 1.0
      exact_arc_length: false
      feasibility_check_no_poses: 5
      publish_feedback: false

      max_vel_x: 2.0
      max_vel_x_backwards: 0.3
      max_vel_y: 2.0
      max_vel_theta: 6.0
      acc_lim_x: 2.5
      acc_lim_y: 2.0
      acc_lim_theta: 6.0
      min_turning_radius: 0.0
      wheelbase: 0.0
      cmd_angle_instead_rotvel: false

      footprint_model:
        type: circular
        radius: 0.45

      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28
      free_goal_vel: false
      complete_global_plan: true

      min_obstacle_dist: 0.25
      inflation_dist: 0.8
      include_costmap_obstacles: true
      costmap_obstacles_behind_robot_dist: 2.0
      obstacle_poses_affected: 15
      include_dynamic_obstacles: false
      dynamic_obstacle_inflation_dist: 0.8

      costmap_converter_plugin: ""
      costmap_converter_spin_thread: true
      costmap_converter_rate: 5

      no_inner_iterations: 5
      no_outer_iterations: 4
      optimization_activate: true
      optimization_verbose: false
      penalty_epsilon: 0.1
      obstacle_cost_exponent: 4.0
      weight_max_vel_x: 2.0
      weight_max_vel_y: 2.0
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 1.0
      weight_acc_lim_y: 1.0
      weight_acc_lim_theta: 1.0
      weight_kinematics_nh: 0.0
      weight_kinematics_forward_drive: 0.0
      weight_kinematics_turning_radius: 0.1
      weight_optimaltime: 0.1
      weight_shortest_path: 0.0
      weight_obstacle: 100.0
      weight_inflation: 0.2
      weight_dynamic_obstacle: 10.0
      weight_dynamic_obstacle_inflation: 0.2
      weight_viapoint: 1.0
      weight_adapt_factor: 2.0

      enable_homotopy_class_planning: false
      enable_multithreading: true
      max_number_classes: 4
      selection_cost_hysteresis: 1.0
      selection_prefer_initial_plan: 0.9
      selection_obst_cost_scale: 100.0
      selection_alternative_time_cost: false
      roadmap_graph_no_samples: 15
      roadmap_graph_area_width: 5.0
      roadmap_graph_area_length_scale: 1.0
      h_signature_prescaler: 0.5
      h_signature_threshold: 0.1
      obstacle_heading_threshold: 0.45
      switching_blocking_period: 0.0
      viapoints_all_candidates: true
      delete_detours_backwards: true
      max_ratio_detours_duration_best_duration: 3.0
      visualize_hc_graph: false
      visualize_with_time_as_z_axis_scale: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link_fake
      rolling_window: true
      width: 20.0
      height: 20.0
      resolution: 0.1
      robot_radius: 0.45
      plugins:
        - obstacle_layer
        - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan obstacle_points virtual_lane_points
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          max_obstacle_height: 1.5
        obstacle_points:
          topic: /obstacle_points
          data_type: PointCloud2
          clearing: false
          marking: true
          min_obstacle_height: -0.2
          max_obstacle_height: 2.5
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
          observation_persistence: 0.4
        virtual_lane_points:
          topic: /virtual_lane_points
          data_type: PointCloud2
          clearing: false
          marking: true
          min_obstacle_height: -0.1
          max_obstacle_height: 0.5
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
          observation_persistence: 0.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.8
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link_fake
      rolling_window: true
      width: 120.0
      height: 120.0
      resolution: 0.2
      robot_radius: 0.45
      track_unknown_space: false
      plugins:
        - obstacle_layer
        - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan obstacle_points virtual_lane_points
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_max_range: 15.0
          obstacle_min_range: 0.0
          raytrace_max_range: 20.0
          raytrace_min_range: 0.0
          max_obstacle_height: 1.5
        obstacle_points:
          topic: /obstacle_points
          data_type: PointCloud2
          clearing: false
          marking: true
          min_obstacle_height: -0.2
          max_obstacle_height: 2.5
          obstacle_max_range: 25.0
          obstacle_min_range: 0.0
          observation_persistence: 1.0
        virtual_lane_points:
          topic: /virtual_lane_points
          data_type: PointCloud2
          clearing: false
          marking: true
          min_obstacle_height: -0.1
          max_obstacle_height: 0.5
          obstacle_max_range: 25.0
          obstacle_min_range: 0.0
          observation_persistence: 1.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.9
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins:
      - GridBased
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 1.0
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins:
      - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - wait
    global_frame: odom
    robot_base_frame: base_link_fake
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.0
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: false
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity:
      - 2.5
      - 2.0
      - 6.0
    min_velocity:
      - -1.5
      - -2.0
      - -6.0
    max_accel:
      - 3.0
      - 2.0
      - 6.0
    max_decel:
      - -3.0
      - -2.0
      - -6.0
    odom_topic: /odometry/global
    odom_duration: 0.1
    deadband_velocity:
      - 0.0
      - 0.0
      - 0.0
    velocity_timeout: 1.0
